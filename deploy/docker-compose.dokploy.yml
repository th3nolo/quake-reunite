# Dokploy deployment for the Contabo VPS (217.216.84.215). Deploy as "Docker Compose"
# (NOT Stack): this file uses build: and top-level service labels, which the compose
# provider honors. Served publicly at https://venezuel.help (+ www) via Dokploy's Traefik.
#
# Two services share the /data volume: the REST API and the autonomous maintainer.
#
# ENV: Dokploy injects the variables you set in the service "Environment" tab by
# interpolating ${...} below (it does NOT drop a .env next to this file). Set the three
# secrets in Dokploy: CEREBRAS_API_KEY, OCR_API_KEY, FIRECRAWL_API_KEY. The rest default.
# (To run a multi-key Cerebras pool instead, set CEREBRAS_API_KEYS=key1,key2 and leave
# CEREBRAS_API_KEY empty; the code prefers the plural when present.)
#
# NETWORKS:
#   dokploy-network (external, attachable overlay): Dokploy's Traefik docker provider only
#     discovers containers on THIS network, so the api must join it or it is never routed.
#   internal (private bridge): maintainer -> api admin reload by service name, off the shared
#     network so the `api` alias can't collide with another Dokploy app's `api`.
#
# AFTER FIRST DEPLOY: seed the volume with the resolved DB (it is PII + gitignored, never
# baked into the image). The first deploy creates the volume; then run on the VPS:
#   deploy/seed-data.sh /root/directorio-seed/directorio.db <project>_directorio_data
# Otherwise the API serves an empty index until the maintainer rebuilds it from the VR API.
#
# dns: fast public resolvers as the embedded-DNS UPSTREAM. Service names (api/maintainer)
# still resolve via the engine's embedded DNS; only EXTERNAL lookups (Cerebras, Firecrawl,
# Photon, Venezuela Reporta) are forwarded here. Fixes a ~5s/lookup stall seen when the host
# resolver is slow/unreachable from inside the container (e.g. rootless podman + WSL gateway).
version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    dns: ["1.1.1.1", "8.8.8.8"]
    environment:
      - DATA_DIR=/data
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - CEREBRAS_API_KEYS=${CEREBRAS_API_KEYS:-}
      - CEREBRAS_MODEL=${CEREBRAS_MODEL:-gemma-4-31b}
      - CEREBRAS_API_URL=${CEREBRAS_API_URL:-https://api.cerebras.ai/v1/chat/completions}
      - OCR_API_KEY=${OCR_API_KEY:-}
      - OCR_API_URL=${OCR_API_URL:-https://api.mistral.ai/v1/ocr}
      - OCR_MODEL=${OCR_MODEL:-mistral-ocr-latest}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-https://api.firecrawl.dev}
      - API_RATE_PER_MIN=${API_RATE_PER_MIN:-120}
    volumes:
      - directorio_data:/data
    networks:
      - internal
      - dokploy-network
    # --proxy-headers + trust-all-proxies: container is only reachable via Traefik, so
    # honoring X-Forwarded-* gives the real client IP to the rate-limit/audit guard.
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8080",
              "--proxy-headers", "--forwarded-allow-ips", "*"]
    restart: unless-stopped
    # Routing + HTTPS are managed in the Dokploy UI (api service "Domains" tab):
    #   Host=venezuel.help, Path=/, Container Port=8080, HTTPS=on (Let's Encrypt); add www too.
    # We keep only enable + the network hint so Dokploy's generated router can reach this
    # multi-homed container over the shared overlay (it is on both internal and dokploy-network).
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"

  maintainer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    dns: ["1.1.1.1", "8.8.8.8"]
    environment:
      - DATA_DIR=/data
      - API_RELOAD_URL=http://api:8080/admin/reload
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - CEREBRAS_API_KEYS=${CEREBRAS_API_KEYS:-}
      - CEREBRAS_MODEL=${CEREBRAS_MODEL:-gemma-4-31b}
      - CEREBRAS_API_URL=${CEREBRAS_API_URL:-https://api.cerebras.ai/v1/chat/completions}
      - OCR_API_KEY=${OCR_API_KEY:-}
      - OCR_API_URL=${OCR_API_URL:-https://api.mistral.ai/v1/ocr}
      - OCR_MODEL=${OCR_MODEL:-mistral-ocr-latest}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-https://api.firecrawl.dev}
      - MAINTAINER_GEMMA_PRIORITIZE=${MAINTAINER_GEMMA_PRIORITIZE:-}
    volumes:
      - directorio_data:/data
    networks:
      - internal
    command: ["python", "maintainer/loop.py", "--loop", "--interval", "600"]
    restart: unless-stopped
    depends_on:
      - api

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge

volumes:
  directorio_data:
